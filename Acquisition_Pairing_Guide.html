// ─── RENDER ───
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = '<div class="sb-label">Anchor System Integrators</div>';
  ANCHORS.forEach(a => {
    const card = document.createElement("div");
    card.className = "anchor-card";
    card.id = "ac-" + a.id;
    card.onclick = () => selectAnchor(a.id);
    const capType = (a.hasWES && a.hasHardware) ? "both" : a.hasWES || a.hasWCS ? "sw" : "hw";
    const capLabel = capType === "both" ? "SW + HW" : capType === "sw" ? "Software" : "Hardware";
    const capClass = capType === "both" ? "ac-both" : capType === "sw" ? "ac-sw" : "ac-hw";
    const pctFit = ((parseFloat(a.fit) / 5) * 100);
    const barColor = pctFit > 90 ? "#4ade80" : pctFit > 80 ? "#60a0f0" : "#f0a060";
    card.innerHTML = `
      <div class="ac-name">${a.name}</div>
      <div class="ac-meta"><span>Tier ${a.tier}</span><span>Fit ${a.fit}</span></div>
      <div class="ac-meta"><span>${a.revenue} rev · ${a.employees} emp</span><span>${a.hq}</span></div>
      <span class="ac-tag ${capClass}">${capLabel} · ${a.software.split("(")[0].trim()}</span>
      <div class="ac-bar"><div class="ac-bar-fill" style="width:${pctFit}%;background:${barColor}"></div></div>
    `;
    sb.appendChild(card);
  });
}

function selectAnchor(id) {
  document.querySelectorAll(".anchor-card").forEach(c => c.classList.remove("active"));
  document.getElementById("ac-" + id).classList.add("active");

  const a = ANCHORS.find(x => x.id === id);
  const main = document.getElementById("main");
  let html = "";

  // Hero
  html += `<div class="anchor-hero">
    <div class="ah-name">${a.name}</div>
    <div class="ah-subtitle">Anchor System Integrator · ${a.software}</div>
    <div class="ah-grid">
      <div class="ah-stat"><div class="ah-stat-val">${a.fit}</div><div class="ah-stat-lbl">Fit Score</div></div>
      <div class="ah-stat"><div class="ah-stat-val">${a.ip}/5</div><div class="ah-stat-lbl">IP Score</div></div>
      <div class="ah-stat"><div class="ah-stat-val">${a.tier}</div><div class="ah-stat-lbl">Tier</div></div>
      <div class="ah-stat"><div class="ah-stat-val">${a.revenue}</div><div class="ah-stat-lbl">Revenue</div></div>
      <div class="ah-stat"><div class="ah-stat-val">${a.employees}</div><div class="ah-stat-lbl">Employees</div></div>
    </div>
    <div class="ah-cap">
      <div class="ah-cap-title">Capabilities</div>
      <div class="ah-caps">
        <span class="cap-pill ${a.hasWES ? 'has' : 'gap'}">${a.hasWES ? '✓' : '✗'} WES</span>
        <span class="cap-pill ${a.hasWCS ? 'has' : 'gap'}">${a.hasWCS ? '✓' : '✗'} WCS</span>
        <span class="cap-pill ${a.hasHardware ? 'has' : 'gap'}">${a.hasHardware ? '✓' : '✗'} Hardware/OEM</span>
        <span class="cap-pill ${a.hasManufacturing ? 'has' : 'gap'}">${a.hasManufacturing ? '✓' : '✗'} Manufacturing</span>
        <span class="cap-pill ${a.hasRobotics ? 'has' : 'gap'}">${a.hasRobotics ? '✓' : '✗'} Robotics</span>
        <span class="cap-pill ${a.hasGTP ? 'has' : 'gap'}">${a.hasGTP ? '✓' : '✗'} GTP/AS-RS</span>
        <span class="cap-pill ${a.hasAI ? 'has' : 'gap'}">${a.hasAI ? '✓' : '✗'} AI/ML</span>
        <span class="cap-pill ${a.hasCloudPlatform ? 'has' : 'gap'}">${a.hasCloudPlatform ? '✓' : '✗'} Cloud Platform</span>
      </div>
    </div>
  </div>`;

  // Enriched Profile
  html += `<div class="profile-section">
    <div class="ps-title">Company Profile</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-lbl">Headquarters</div><div class="info-val">${a.hq}</div></div>
      <div class="info-item"><div class="info-lbl">Founded</div><div class="info-val">${a.founded}</div></div>
      <div class="info-item"><div class="info-lbl">Ownership</div><div class="info-val">${a.ownership}</div></div>

    </div>
    <div style="margin-top:12px"><div class="info-lbl" style="margin-bottom:4px">Key Customers</div>
      <div class="customer-chips">${(a.keyCustomers||[]).map(c=>'<span class="cust-chip">'+c+'</span>').join('')}</div>
    </div>
  </div>`;

  // Product Details
  html += `<div class="profile-section">
    <div class="ps-title">Products & Solutions (from Diligence)</div>
    <div class="product-grid">
      ${(a.productDetails||[]).map(p=>`
        <div class="product-item">
          <div class="pi-name">${p.name}</div>
          <div class="pi-desc">${p.desc}</div>

        </div>
      `).join('')}
    </div>
  </div>`;

  // Software & Hardware Detail
  html += `<div class="profile-section">
    <div class="ps-title">Software & Hardware Assessment</div>
    <div class="info-grid" style="grid-template-columns:1fr 1fr">
      <div class="info-item"><div class="info-lbl">Software Detail</div><div class="info-val" style="font-size:11px">${a.softwareDetail}</div></div>

  // Strengths & Gaps
  html += `<div class="profile-section">

  // Peripheral sections
  a.peripherals.forEach(cat => {
    html += `<div class="section-label">${cat.cat}</div>`;
    html += `<div class="pair-grid">`;
    cat.pairings.forEach(p => {
      html += `
        <div class="pair-card ${p.primary ? 'primary' : 'alt'}">

  html += `<div class="combo-summary">

  primaries.forEach(p => {

  });
  html += `<div class="cs-row"><span class="cs-lbl">Bundle fills ${primaries.length} capability gaps</span><span class="cs-val">${primaries.length + 1} companies</span></div>`;
  html += `</div>`;

  main.innerHTML = html;
}

renderSidebar();
