function renderCanvas(filter) {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  let counts = { total: 0, shortlist: 0, promote: 0, backup: 0, validate: 0 };

  Object.entries(DATA).forEach(([listKey, list]) => {
    if (filter !== "all" && filter !== listKey && filter !== "shortlist" && filter !== "promote") return;

    const section = document.createElement("div");
    section.className = "list-section";

    const header = document.createElement("div");
    header.className = "list-header";
    header.style.background = list.color;
    header.style.borderLeft = `4px solid ${list.border}`;
    header.style.color = "#fff";
    header.textContent = list.label;
    section.appendChild(header);

    const clustersDiv = document.createElement("div");
    clustersDiv.className = "clusters";

    let hasVisibleCompany = false;

    list.clusters.forEach(cluster => {
      let filteredCompanies = cluster.companies;
      if (filter === "shortlist") filteredCompanies = cluster.companies.filter(c => c.status === "shortlist");
      if (filter === "promote") filteredCompanies = cluster.companies.filter(c => c.status === "promote");
      if (filteredCompanies.length === 0) return;

      hasVisibleCompany = true;
      const clusterDiv = document.createElement("div");
      clusterDiv.className = "cluster";

      const label = document.createElement("div");
      label.className = "cluster-label";
      label.innerHTML = `<span class="cluster-icon">${cluster.icon}</span> ${cluster.label}`;
      clusterDiv.appendChild(label);

      filteredCompanies.forEach(co => {
        counts.total++;
        if (co.status === "shortlist") counts.shortlist++;
        if (co.status === "promote") counts.promote++;
        if (co.status === "backup") counts.backup++;
        if (co.status === "validate") counts.validate++;

        const coDiv = document.createElement("div");
        coDiv.className = "company";
        coDiv.onclick = () => {
          const panel = coDiv.querySelector(".detail-panel");
          const isOpen = panel.classList.contains("show");
          document.querySelectorAll(".detail-panel.show").forEach(p => p.classList.remove("show"));
          document.querySelectorAll(".company.expanded").forEach(c => c.classList.remove("expanded"));
          if (!isOpen) { panel.classList.add("show"); coDiv.classList.add("expanded"); }
        };

        const pip = document.createElement("div");
        pip.className = "status-pip";
        pip.style.background = STATUS_COLORS[co.status];

        const info = document.createElement("div");
        info.className = "company-info";

        const nameEl = document.createElement("div");
        nameEl.className = "company-name";
        nameEl.textContent = co.name;

        const tag = document.createElement("span");
        tag.className = "company-tag";
        tag.style.background = STATUS_COLORS[co.status] + "33";
        tag.style.color = STATUS_COLORS[co.status];
        tag.textContent = STATUS_LABELS[co.status];
        nameEl.appendChild(tag);

        const prodEl = document.createElement("div");
        prodEl.className = "company-products";
        prodEl.textContent = co.products;

        const detail = document.createElement("div");
        detail.className = "detail-panel";
        detail.innerHTML = `
          <div class="detail-row"><span class="detail-label">Fit Score</span><span class="detail-value">${co.fit}</span></div>
          <div class="detail-row"><span class="detail-label">IP Score</span><span class="detail-value">${co.ip}/5</span></div>
          <div class="detail-row"><span class="detail-label">Tier</span><span class="detail-value">${co.tier}</span></div>
          <div class="detail-row"><span class="detail-label">Est. Cost</span><span class="detail-value">${co.cost}</span></div>
          <div class="detail-row"><span class="detail-label">Tech Focus</span><span class="detail-value">${co.tech}</span></div>
        `;

        info.appendChild(nameEl);
        info.appendChild(prodEl);
        info.appendChild(detail);

        coDiv.appendChild(pip);
        coDiv.appendChild(info);
        clusterDiv.appendChild(coDiv);
      });

      clustersDiv.appendChild(clusterDiv);
    });

    if (hasVisibleCompany) {
      section.appendChild(clustersDiv);
      canvas.appendChild(section);
    }
  });

  document.getElementById("stat-total").textContent = counts.total;
  document.getElementById("stat-shortlist").textContent = counts.shortlist;
  document.getElementById("stat-promote").textContent = counts.promote;
  document.getElementById("stat-backup").textContent = counts.backup;
  document.getElementById("stat-validate").textContent = counts.validate;
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderCanvas(btn.dataset.filter);
  });
});

renderCanvas("all");
</script>
</body>
</html>
